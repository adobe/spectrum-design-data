$schema: "https://moonrepo.dev/schemas/project.json"
layer: library
fileGroups:
  sources:
    - "src/**/*"
  tests:
    - "test/**/*"
tasks:
  validateDesignData:
    command: cargo
    args:
      - run
      - --manifest-path
      - ../../sdk/Cargo.toml
      - --bin
      - design-data
      - --
      - validate
      - ./src
      - --schema-path
      - ./schemas
      - --exceptions-path
      - ./naming-exceptions.json
    platform: system
    inputs:
      - "@globs(sources)"
      - "schemas/**/*.json"
      - "snapshots/**/*.json"
      - "naming-exceptions.json"
  verifyDesignDataSnapshot:
    command: cargo
    args:
      - run
      - --manifest-path
      - ../../sdk/Cargo.toml
      - --bin
      - design-data
      - --
      - migrate
      - verify
      - ./src
      - --snapshot
      - ./snapshots/validation-snapshot.json
      - --schema-path
      - ./schemas
      - --exceptions-path
      - ./naming-exceptions.json
    platform: system
    inputs:
      - "@globs(sources)"
      - "schemas/**/*.json"
      - "snapshots/**/*.json"
      - "naming-exceptions.json"
  build:
    deps:
      - ~:buildTokens
      - ~:buildManifest
  buildTokens:
    command:
      - node
      - tasks/buildSpectrumTokens.js
    platform: node
    inputs:
      - "tasks/buildSpectrumTokens.js"
      - "@globs(sources)"
    outputs:
      - "dist/"
  buildManifest:
    command:
      - node
      - tasks/buildManifest.js
    platform: node
    inputs:
      - "tasks/buildManifest.js"
      - "@globs(sources)"
    outputs:
      - "manifest.json"
  clean:
    command:
      - rm
      - -rf
      - dist
    local: true
    platform: system
  test:
    command:
      - pnpm
      - ava
    inputs:
      - "tasks/**/*"
      - "schemas/**/*.{yaml,yml,json}"
      - "manifest.json"
      - "@globs(tests)"
      - "@globs(sources)"
    deps:
      - ~:buildTokens
      - ~:verifyDesignDataSnapshot
    platform: node
  test-watch:
    command:
      - ava
      - --watch
    local: true
    platform: node

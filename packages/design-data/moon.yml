$schema: "https://moonrepo.dev/schemas/project.json"
layer: library
fileGroups:
  tokens:
    - "tokens/**/*.tokens.json"

tasks:
  # Validate the cascade token files against the design-data spec rules.
  validate:
    command: ../../sdk/target/debug/design-data
    args:
      - validate
      - ./tokens
      - --exceptions-path
      - ../tokens/naming-exceptions.json
    platform: system
    deps:
      - sdk:build
    inputs:
      - "@globs(tokens)"
      - "../tokens/naming-exceptions.json"

  # Regenerate packages/tokens/src/ from the cascade source of truth.
  # Run this after editing any tokens/*.tokens.json file to keep the
  # legacy package in sync for downstream consumers.
  legacy-output:
    command: ../../sdk/target/debug/design-data
    args:
      - migrate
      - legacy-output
      - ./tokens
      - --output
      - ../tokens/src
    platform: system
    deps:
      - sdk:build
    inputs:
      - "@globs(tokens)"
    outputs:
      - "../tokens/src/**/*.json"

  # Regenerate the cascade token files from the legacy source.
  # Used to re-sync this package after upstream legacy changes.
  # Under normal operation, edits should be made here (cascade) not in
  # packages/tokens/src (legacy).
  generate:
    command: ../../sdk/target/debug/design-data
    args:
      - migrate
      - convert
      - ../tokens/src
      - --output
      - ./tokens
      - --names-dir
      - ../token-names/names
      - --exceptions
      - ../tokens/naming-exceptions.json
    platform: system
    deps:
      - sdk:build
    inputs:
      - "../tokens/src/**/*.json"
      - "../token-names/names/**/*.json"
      - "../tokens/naming-exceptions.json"
    outputs:
      - "@globs(tokens)"

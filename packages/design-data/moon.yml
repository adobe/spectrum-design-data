$schema: "https://moonrepo.dev/schemas/project.json"
layer: library
fileGroups:
  tokens:
    - "tokens/**/*.tokens.json"

tasks:
  # Validate the cascade token files against the design-data spec rules.
  # Note: `validate` uses --exceptions-path; `migrate convert` uses --exceptions.
  # These are different subcommands with different flag names.
  validate:
    command: ../../sdk/target/debug/design-data
    args:
      - validate
      - ./tokens
      - --exceptions-path
      - ../tokens/naming-exceptions.json
    options:
      # Cascade tokens have pre-existing SPEC-010 errors (replaced_by targets that
      # exist only in the legacy dataset, not yet migrated to cascade format).
      # Re-enable in CI once those are resolved.
      runInCI: false
    platform: system
    deps:
      - sdk:build
    inputs:
      - "@globs(tokens)"
      - "/packages/tokens/naming-exceptions.json"

  # Regenerate packages/tokens/src/ from the cascade source of truth.
  # Run this after editing any tokens/*.tokens.json file to keep the
  # legacy package in sync for downstream consumers.
  legacy-output:
    command: ../../sdk/target/debug/design-data
    args:
      - migrate
      - legacy-output
      - ./tokens
      - --output
      - ../tokens/src
    platform: system
    deps:
      - sdk:build
    inputs:
      - "@globs(tokens)"
    outputs:
      - "/packages/tokens/src/**/*.json"

  # CI guard: verify that packages/tokens/src/ is in sync with the cascade
  # source. Fails if a PR updates cascade tokens without re-running legacy-output.
  roundtrip-verify:
    command: ../../sdk/target/debug/design-data
    args:
      - migrate
      - roundtrip-verify
      - ../tokens/src
    platform: system
    deps:
      - sdk:build
    inputs:
      - "@globs(tokens)"
      - "/packages/tokens/src/**/*.json"

  # ONE-TIME / ESCAPE HATCH — Re-sync cascade files from the legacy package.
  # Use this only when upstream legacy changes need to be pulled into cascade
  # before the full migration is complete. Under normal operation, all edits
  # go into tokens/*.tokens.json (cascade), not packages/tokens/src/ (legacy).
  #
  # WARNING: this task OVERWRITES the cascade token files. Do not run it
  # routinely — doing so would discard any hand-authored taxonomy improvements
  # in the cascade source.
  regenerate-from-legacy:
    command: ../../sdk/target/debug/design-data
    args:
      - migrate
      - convert
      - ../tokens/src
      - --output
      - ./tokens
      - --names-dir
      - ../token-names/names
      - --exceptions
      - ../tokens/naming-exceptions.json
    platform: system
    deps:
      - sdk:build
    inputs:
      - "/packages/tokens/src/**/*.json"
      - "/packages/token-names/names/**/*.json"
      - "/packages/tokens/naming-exceptions.json"
    # No `outputs:` — prevents moon from auto-running this task as part of
    # dependency graphs and silently clobbering hand-edited cascade tokens.

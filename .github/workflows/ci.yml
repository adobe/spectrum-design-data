name: CI
on: pull_request

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Install Rust 1.88.0 + wasm32 target for the sdk-wasm:build task.
      # This also covers sdk:lint (cargo clippy) and aligns with sdk/rust-toolchain.toml.
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: wasm32-unknown-unknown
          components: clippy
      # Install wasm-pack so `moon run sdk-wasm:build` can invoke it.
      - uses: jetli/wasm-pack-action@v0.4.0
      - uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
      - run: moon ci
      - uses: moonrepo/run-report-action@v1
        if: success() || failure()
        with:
          access-token: ${{ secrets.GITHUB_TOKEN }}

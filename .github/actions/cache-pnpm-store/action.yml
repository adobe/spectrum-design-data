name: Cache pnpm store
description: >
  Resolves the pnpm content-addressable store path and caches it, keyed on
  pnpm-lock.yaml. Centralises the "resolve + cache" pattern so all workflows
  and composite actions share one definition.

runs:
  using: composite
  steps:
    - name: Resolve pnpm store path
      id: pnpm-store
      shell: bash
      run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
    - name: Cache pnpm store
      uses: actions/cache@v4
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: pnpm-${{ runner.os }}-

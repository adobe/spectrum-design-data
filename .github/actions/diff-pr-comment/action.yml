name: Diff PR Comment
description: Creates or updates PR comments with diff reports using shared logic

inputs:
  diff-type:
    description: "Type of diff (token, component)"
    required: true
  diff-generated:
    description: "Whether diff was generated (true/false/error)"
    required: true
  diff-content:
    description: "Generated diff content"
    required: true
  pr-number:
    description: "Pull request number"
    required: true
  github-token:
    description: "GitHub token for creating comments"
    required: true
  diff-file-path:
    description: "Path to full generated diff markdown file"
    required: false
    default: "/tmp/diff-report.md"

runs:
  using: composite
  steps:
    - name: Find existing comment
      uses: peter-evans/find-comment@v3
      id: find-comment
      with:
        issue-number: ${{ inputs.pr-number }}
        comment-author: "github-actions[bot]"
        body-includes: "<!-- ${{ inputs.diff-type }}-diff-comment -->"
        token: ${{ inputs.github-token }}

    - name: Set comment details
      id: comment-details
      shell: bash
      run: |
        case "${{ inputs.diff-type }}" in
          "token")
            echo "emoji=🎨" >> $GITHUB_OUTPUT
            echo "title=Token Changes Report" >> $GITHUB_OUTPUT
            echo "description=token" >> $GITHUB_OUTPUT
            ;;
          "component")
            echo "emoji=🧩" >> $GITHUB_OUTPUT
            echo "title=Component Schema Changes Report" >> $GITHUB_OUTPUT
            echo "description=component schema" >> $GITHUB_OUTPUT
            ;;
          *)
            echo "emoji=📊" >> $GITHUB_OUTPUT
            echo "title=Changes Report" >> $GITHUB_OUTPUT
            echo "description=diff" >> $GITHUB_OUTPUT
            ;;
        esac

    - name: Prepare comment content
      id: prepare-content
      shell: bash
      run: |
        COMMENT_BODY_PATH=/tmp/comment_body.md
        FULL_REPORT_PATH=/tmp/full_diff_report.md
        MAX_COMMENT_SIZE=60000
        MAX_ITEMS_PER_SECTION=20
        SUMMARY_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

        truncate_details_sections() {
          local input_file="$1"
          local output_file="$2"
          local max_items="$3"

          awk -v max_items="$max_items" '
            BEGIN {
              in_details = 0;
              top_bullet_count = 0;
              hidden_count = 0;
            }
            /^<details/ {
              in_details = 1;
              top_bullet_count = 0;
              hidden_count = 0;
              print $0;
              next;
            }
            in_details && /^<\/details>/ {
              if (hidden_count > 0) {
                print "";
                print "_... and " hidden_count " more items in this section. See full report link below._";
                print "";
              }
              print $0;
              in_details = 0;
              next;
            }
            in_details {
              if ($0 ~ /^- `/) {
                top_bullet_count++;
                if (top_bullet_count <= max_items) {
                  print $0;
                } else {
                  hidden_count++;
                }
                next;
              }
              if ($0 ~ /^[[:space:]]+- /) {
                if (top_bullet_count <= max_items) {
                  print $0;
                }
                next;
              }
              print $0;
              next;
            }
            {
              print $0;
            }
          ' "$input_file" > "$output_file"
        }

        # Create the comment header
        echo "<!-- ${{ inputs.diff-type }}-diff-comment -->" > "$COMMENT_BODY_PATH"
        echo "## ${{ steps.comment-details.outputs.emoji }} ${{ steps.comment-details.outputs.title }}" >> "$COMMENT_BODY_PATH"
        echo "" >> "$COMMENT_BODY_PATH"

        if [ "${{ inputs.diff-generated }}" == "true" ]; then
          echo "${{ inputs.diff-content }}" | base64 -d > "$FULL_REPORT_PATH"
          cat "$FULL_REPORT_PATH" >> "$COMMENT_BODY_PATH"
        elif [ "${{ inputs.diff-generated }}" == "too-large" ]; then
          if [ -f "${{ inputs.diff-file-path }}" ] && [ -s "${{ inputs.diff-file-path }}" ]; then
            cp "${{ inputs.diff-file-path }}" "$FULL_REPORT_PATH"
          fi

          echo "⚠️ **The diff output is too large to display in a PR comment.**" >> "$COMMENT_BODY_PATH"
          echo "" >> "$COMMENT_BODY_PATH"
          echo "${{ inputs.diff-content }}" >> "$COMMENT_BODY_PATH"
          echo "" >> "$COMMENT_BODY_PATH"
        elif [ "${{ inputs.diff-generated }}" == "false" ]; then
          echo "No ${{ steps.comment-details.outputs.description }} changes detected in this pull request." >> "$COMMENT_BODY_PATH"
        else
          echo "⚠️ **Error**: ${{ inputs.diff-content }}" >> "$COMMENT_BODY_PATH"
          echo "" >> "$COMMENT_BODY_PATH"
          echo "Please check the [workflow logs](${SUMMARY_URL}) for more details." >> "$COMMENT_BODY_PATH"
        fi

        comment_size=$(wc -c < "$COMMENT_BODY_PATH")
        echo "::debug::Comment body size: ${comment_size} bytes (limit: ${MAX_COMMENT_SIZE})"

        if [ "$comment_size" -gt "$MAX_COMMENT_SIZE" ] || [ "${{ inputs.diff-generated }}" == "too-large" ]; then
          echo "::notice::Report exceeds comment size limit (${comment_size} bytes). Writing full report to Job Summary."

          if [ -f "$FULL_REPORT_PATH" ] && [ -s "$FULL_REPORT_PATH" ]; then
            full_report_size=$(wc -c < "$FULL_REPORT_PATH")
            echo "::debug::Full report size: ${full_report_size} bytes"

            {
              echo "## ${{ steps.comment-details.outputs.emoji }} ${{ steps.comment-details.outputs.title }} — Full Report"
              echo ""
              cat "$FULL_REPORT_PATH"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::debug::Wrote full report to GITHUB_STEP_SUMMARY"

            truncated_report_path=$(mktemp)
            truncate_details_sections "$FULL_REPORT_PATH" "$truncated_report_path" "$MAX_ITEMS_PER_SECTION"
            truncated_size=$(wc -c < "$truncated_report_path")
            echo "::debug::Truncated report size: ${truncated_size} bytes"

            {
              echo "<!-- ${{ inputs.diff-type }}-diff-comment -->"
              echo "## ${{ steps.comment-details.outputs.emoji }} ${{ steps.comment-details.outputs.title }}"
              echo ""
              echo "⚠️ **This report was truncated due to GitHub comment size limits.**"
              echo ""
              echo "📋 **[View full report in the Actions Job Summary](${SUMMARY_URL})**"
              echo ""
              cat "$truncated_report_path"
              echo ""
            } > "$COMMENT_BODY_PATH"
          else
            echo "::warning::Full report file is missing or empty at ${FULL_REPORT_PATH}"
          fi
        fi

        # Add footer
        echo "" >> "$COMMENT_BODY_PATH"
        echo "---" >> "$COMMENT_BODY_PATH"
        echo "*This comment was automatically generated by the ${{ steps.comment-details.outputs.description }} diff tool. 🤖*" >> "$COMMENT_BODY_PATH"

        final_size=$(wc -c < "$COMMENT_BODY_PATH")
        echo "::debug::Final comment body size: ${final_size} bytes"

    - name: Create or update PR comment
      uses: peter-evans/create-or-update-comment@v4
      with:
        comment-id: ${{ steps.find-comment.outputs.comment-id }}
        issue-number: ${{ inputs.pr-number }}
        token: ${{ inputs.github-token }}
        body-path: /tmp/comment_body.md
        edit-mode: replace

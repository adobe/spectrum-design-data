name = "wasm-pack"
type = "cli"

[resolve]
git-url = "https://github.com/rustwasm/wasm-pack"

[platform.linux]
archive-prefix = "wasm-pack-v{version}-{arch}-unknown-linux-musl"
exe-path = "wasm-pack"
download-file = "wasm-pack-v{version}-{arch}-unknown-linux-musl.tar.gz"

[platform.macos]
archive-prefix = "wasm-pack-v{version}-{arch}-apple-darwin"
exe-path = "wasm-pack"
download-file = "wasm-pack-v{version}-{arch}-apple-darwin.tar.gz"

[platform.windows]
archive-prefix = "wasm-pack-v{version}-x86_64-pc-windows-msvc"
exe-path = "wasm-pack.exe"
download-file = "wasm-pack-v{version}-x86_64-pc-windows-msvc.tar.gz"

[install]
download-url = "https://github.com/rustwasm/wasm-pack/releases/download/v{version}/{download_file}"

[install.arch]
aarch64 = "aarch64"
x86_64 = "x86_64"

[install.exes.wasm-pack]
exe-path = "wasm-pack"
primary = true

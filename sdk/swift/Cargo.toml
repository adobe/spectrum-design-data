[package]
name = "design-data-swift"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Native Swift bindings for design-data-core — full Dataset API (query, validate, resolve, diff, suggest) via UniFFI, distributed as an XCFramework + Swift Package."

[lib]
crate-type = ["staticlib", "cdylib", "lib"]

[[bin]]
name = "uniffi-bindgen"
path = "src/bin/uniffi-bindgen.rs"

[dependencies]
design-data-core = { path = "../core", default-features = false, features = ["cache"] }
uniffi = { version = "0.28", features = ["cli"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"

[features]
# When `embedded` is enabled, include_bytes! pulls in src/embedded_cache.redb
# (generated by `moon run sdk-swift:cache-build`) and Dataset.embedded() works.
# Disabled by default so the crate builds without requiring the generated blob.
embedded = []

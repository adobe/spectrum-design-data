# Enable the wasm_js backend for getrandom on wasm32-unknown-unknown.
#
# getrandom 0.3's opt-in backends require both:
#   (a) the `wasm_js` Cargo feature on the getrandom dep (set in sdk/core/Cargo.toml), AND
#   (b) this cfg flag, which tells getrandom to activate the wasm_js backend at compile time.
#
# This flag is needed because enabling the feature in a library's Cargo.toml alone is
# insufficient — getrandom reads the cfg to pick its randomness backend.
# See: https://docs.rs/getrandom/latest/getrandom/#webassembly-support
[target.wasm32-unknown-unknown]
rustflags = ['--cfg', 'getrandom_backend="wasm_js"']

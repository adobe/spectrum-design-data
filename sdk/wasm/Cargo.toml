[package]
name = "design-data-wasm"
version = "0.0.1"
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "WebAssembly bindings for design-data-core — exposes query, validate, resolve, diff, and registry helpers to JavaScript/TypeScript via wasm-bindgen."

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
design-data-core = { path = "../core", default-features = false, features = ["wasm"] }
wasm-bindgen = "0.2"
serde-wasm-bindgen = "0.6"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tsify-next = { version = "0.5", features = ["js"] }
console_error_panic_hook = "0.1"
js-sys = "0.3"

[features]
# When `embedded` is enabled, include_bytes! pulls in sdk/wasm/src/embedded_cache.redb
# (generated by `moon run sdk-wasm:cache-build`) and Dataset::embedded() works.
# Disabled by default so the crate builds without requiring the generated blob.
embedded = []

[dev-dependencies]
wasm-bindgen-test = "0.3"
